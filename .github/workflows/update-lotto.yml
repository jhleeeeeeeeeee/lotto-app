name: Update Lotto Data

on:
  schedule:
    - cron: '0 12 * * 6'  # 매주 토요일 오후 9시 (KST = UTC+9, 21:00 = 12:00 UTC)
  workflow_dispatch:        # 수동 실행 버튼도 활성화

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch lotto data
        run: |
          node scripts/fetch-lotto.js

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/lotto.json
          git diff --staged --quiet || git commit -m "chore: update lotto data $(date +'%Y-%m-%d')"
          git push
